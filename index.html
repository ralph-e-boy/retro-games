<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RETRO ARCADE</title>
<style>
  :root {
    --neon-cyan: #00f0ff;
    --neon-pink: #ff2e88;
    --neon-purple: #b14aff;
    --neon-yellow: #ffe600;
    --bg: #060010;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    font-family: "Courier New", Courier, monospace;
    background: var(--bg);
    color: #fff;
    min-height: 100%;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 4vh 16px 8vh;
    position: relative;
  }

  /* animated grid floor */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
      linear-gradient(transparent 0%, rgba(177, 74, 255, 0.08) 100%),
      repeating-linear-gradient(to right, rgba(0,240,255,0.10) 0 1px, transparent 1px 60px),
      repeating-linear-gradient(to bottom, rgba(0,240,255,0.10) 0 1px, transparent 1px 60px);
    transform: perspective(420px) rotateX(62deg) scale(2.2);
    transform-origin: center bottom;
    bottom: -40%;
    top: 55%;
    animation: scroll-grid 6s linear infinite;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes scroll-grid {
    from { background-position: 0 0, 0 0, 0 0; }
    to   { background-position: 0 0, 0 0, 0 60px; }
  }

  /* CRT scanlines + flicker overlay */
  body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      rgba(0,0,0,0) 0,
      rgba(0,0,0,0) 2px,
      rgba(0,0,0,0.22) 3px,
      rgba(0,0,0,0) 4px
    );
    pointer-events: none;
    z-index: 9;
    animation: flicker 5s infinite;
  }

  @keyframes flicker {
    0%, 96%, 100% { opacity: 0.5; }
    97% { opacity: 0.35; }
    98% { opacity: 0.65; }
  }

  .wrap { position: relative; z-index: 2; width: 100%; max-width: 880px; text-align: center; }

  header { margin-bottom: 6vh; }

  .badge {
    display: inline-block;
    font-size: 0.7rem;
    letter-spacing: 0.45em;
    color: var(--neon-cyan);
    border: 1px solid var(--neon-cyan);
    border-radius: 999px;
    padding: 6px 16px 6px 20px;
    margin-bottom: 28px;
    text-transform: uppercase;
    box-shadow: 0 0 12px rgba(0,240,255,0.4);
    animation: pulse 2.4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 8px rgba(0,240,255,0.3); }
    50% { box-shadow: 0 0 20px rgba(0,240,255,0.7); }
  }

  h1 {
    font-size: clamp(2.6rem, 11vw, 6rem);
    font-weight: 900;
    line-height: 0.95;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    background: linear-gradient(180deg, var(--neon-yellow), var(--neon-pink) 60%, var(--neon-purple));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 14px rgba(255,46,136,0.55));
    animation: glitch 4s infinite;
  }

  h1 .line2 { display: block; }

  @keyframes glitch {
    0%, 92%, 100% { transform: translate(0,0); }
    93% { transform: translate(-2px, 1px); }
    94% { transform: translate(2px, -1px); }
    95% { transform: translate(-1px, 0); }
  }

  .tag {
    margin-top: 18px;
    font-size: 0.8rem;
    letter-spacing: 0.3em;
    color: rgba(255,255,255,0.55);
    text-transform: uppercase;
  }

  .blink { animation: blink 1s steps(2) infinite; color: var(--neon-yellow); }
  @keyframes blink { 50% { opacity: 0; } }

  /* game grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 22px;
  }

  .card {
    position: relative;
    display: block;
    text-decoration: none;
    color: #fff;
    background: rgba(12, 4, 32, 0.7);
    border: 2px solid rgba(177,74,255,0.45);
    border-radius: 14px;
    padding: 26px 22px;
    text-align: left;
    overflow: hidden;
    transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    backdrop-filter: blur(2px);
  }

  .card::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 40%, rgba(0,240,255,0.12) 100%);
    opacity: 0;
    transition: opacity 0.18s ease;
  }

  .card:hover, .card:focus-visible {
    transform: translateY(-6px) scale(1.02);
    border-color: var(--neon-cyan);
    box-shadow: 0 0 24px rgba(0,240,255,0.45), inset 0 0 18px rgba(0,240,255,0.15);
    outline: none;
  }

  .card:hover::before, .card:focus-visible::before { opacity: 1; }

  .card .art {
    font-size: 2.6rem;
    line-height: 1;
    margin-bottom: 16px;
    filter: drop-shadow(0 0 8px rgba(255,230,0,0.6));
  }

  .card h2 {
    font-size: 1.25rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 6px;
    color: var(--neon-cyan);
  }

  .card p {
    font-size: 0.8rem;
    color: rgba(255,255,255,0.6);
    line-height: 1.5;
  }

  .card .play {
    display: inline-block;
    margin-top: 16px;
    font-size: 0.72rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--neon-pink);
  }

  .card:hover .play::after { content: " ◄"; }

  /* coming-soon placeholder cards */
  .card.soon {
    border-style: dashed;
    border-color: rgba(255,255,255,0.18);
    opacity: 0.5;
    cursor: default;
    pointer-events: none;
  }
  .card.soon h2 { color: rgba(255,255,255,0.45); }
  .card.soon .art { filter: none; }

  footer {
    margin-top: 7vh;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
  }
  footer span { color: var(--neon-pink); }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <span class="badge">Insert Coin</span>
      <h1>Retro<span class="line2">Arcade</span></h1>
      <p class="tag">Select Game <span class="blink">_</span></p>
    </header>

    <main class="grid">
      <!-- To add a game: copy a card, point href at its folder, swap the emoji/title/blurb. -->
      <a class="card" href="missile-command/">
        <div class="art">🚀</div>
        <h2>Missile Command</h2>
        <p>Defend your cities from incoming nukes. Aim true, the world depends on it.</p>
        <span class="play">Play</span>
      </a>

      <div class="card soon">
        <div class="art">👾</div>
        <h2>Coming Soon</h2>
        <p>More cabinets are being wired up. Check back for new high scores.</p>
      </div>
    </main>

    <footer>Made with <span>♥</span> &amp; pixels · 1 player</footer>
  </div>
</body>
</html>
